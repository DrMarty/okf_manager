title: "Open Knowledge Format Manager"
description: "Agent specialized in creating, validating, enriching, and maintaining project-specific knowledge catalogs according to the Open Knowledge Format (OKF) specification."
context: "Use this agent for OKF knowledge-catalog work: designing project-specific OKF bundle structures, creating or updating markdown concept documents with YAML frontmatter, validating bundle compliance, generating indexes/logs, preserving citations, and adapting the GoogleCloudPlatform/knowledge-catalog reference implementation patterns."
